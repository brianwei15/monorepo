/**:
  ros__parameters:
    # Name of the controller plugin to instantiate.
    controller: "GPIOController"

    pins:
      # Preferred explicit left/right mapping.
      # On this hardware: A* pins are RIGHT motor, B* pins are LEFT motor.
      LEFT_PWM: 18
      LEFT_IN1: 14
      LEFT_IN2: 15
      RIGHT_PWM: 13
      RIGHT_IN1: 20
      RIGHT_IN2: 16

      ENCA_CH1: 5
      ENCA_CH2: 6
      ENCB_CH1: 10
      ENCB_CH2: 9
      SERVO: 23

    motor:
      pwm_frequency: 500.0
      max_wheel_rpm: 120.0
      max_norm_speed: 1.0

    encoder:
      output_cpr: 617
      left_sign: 1
      right_sign: 1

    kinematics:
      wheel_radius_m: 0.01611839
      wheel_separation_m: 0.12132

    pid:
      kp: 0.02
      ki: 0.0
      kd: 0.0
      left_kp: 0.02
      left_ki: 0.0
      left_kd: 0.0
      right_kp: 0.02
      right_ki: 0.0
      right_kd: 0.0
      i_clamp: 1.0
      output_limit_norm: 1.0
      stop_deadband_rpm: 1.0
      velocity_alpha: 1.0

    control:
      loop_ms: 50

    sim:
      world_name: "custom"
