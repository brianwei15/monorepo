payload:
  controller:
    type: string
    default_value: "SimController"
    description: "Controller type"
    validation:
      one_of<>: [["SimController", "GPIOController"]]
  

  pins:
    LEFT_PWM:
      type: int
      default_value: 18
      description: "Preferred: left motor SN754410 enable/PWM pin"
    LEFT_IN1:
      type: int
      default_value: 15
      description: "Preferred: left motor SN754410 IN1"
    LEFT_IN2:
      type: int
      default_value: 14
      description: "Preferred: left motor SN754410 IN2"
    RIGHT_PWM:
      type: int
      default_value: 13
      description: "Preferred: right motor SN754410 enable/PWM pin"
    RIGHT_IN1:
      type: int
      default_value: 16
      description: "Preferred: right motor SN754410 IN1"
    RIGHT_IN2:
      type: int
      default_value: 20
      description: "Preferred: right motor SN754410 IN2"

    # Legacy A/B aliases retained for compatibility.
    APWM:
      type: int
      default_value: 13
      description: "Legacy alias: SN754410 Motor A enable/PWM pin"
    AIN1:
      type: int
      default_value: 16
      description: "Legacy alias: SN754410 Motor A logic input IN1"
    AIN2:
      type: int
      default_value: 20
      description: "Legacy alias: SN754410 Motor A logic input IN2"
    BPWM:
      type: int
      default_value: 18
      description: "Legacy alias: SN754410 Motor B enable/PWM pin"
    BIN1:
      type: int
      default_value: 15
      description: "Legacy alias: SN754410 Motor B logic input IN1"
    BIN2:
      type: int
      default_value: 14
      description: "Legacy alias: SN754410 Motor B logic input IN2"
    ENCA_CH1:
      type: int
      default_value: 0
      description: "Pin number for Encoder A1"
    ENCA_CH2:
      type: int
      default_value: 11
      description: "Pin number for Encoder A2"
    ENCB_CH1:
      type: int
      default_value: 9
      description: "Pin number for Encoder B1"
    ENCB_CH2:
      type: int
      default_value: 10
      description: "Pin number for Encoder B2"
    SERVO:
      type: int
      default_value: 14
      description: "Pin number for hook servo"

  motor:
    pwm_frequency:
      type: double
      default_value: 500.0
      description: "PWM frequency for motors"
    max_wheel_rpm:
      type: double
      default_value: 120.0
      description: "Maximum absolute wheel speed setpoint in RPM"
      validation:
        bounds<>: [0.0, 10000.0]
    max_norm_speed:
      type: double
      default_value: 1.0
      description: "Maximum normalized speed for motors. Uses this value for clamping"
      validation:
        bounds<>: [0.0, 1.0]

  encoder:
    output_cpr:
      type: int
      default_value: 617
      description: "Encoder counts-per-revolution at the output shaft after decode"
      validation:
        bounds<>: [1, 1000000]
    left_sign:
      type: int
      default_value: 1
      description: "Left encoder polarity multiplier"
      validation:
        one_of<>: [[-1, 1]]
    right_sign:
      type: int
      default_value: 1
      description: "Right encoder polarity multiplier"
      validation:
        one_of<>: [[-1, 1]]

  kinematics:
    wheel_radius_m:
      type: double
      default_value: 0.01611839
      description: "Wheel radius in meters"
      validation:
        bounds<>: [0.0, 10.0]
    wheel_separation_m:
      type: double
      default_value: 0.12132
      description: "Distance between wheel contact centers in meters"
      validation:
        bounds<>: [0.0, 10.0]

  pid:
    kp:
      type: double
      default_value: 0.02
      description: "Shared velocity proportional gain applied to both wheels"
      validation:
        bounds<>: [0.0, 100000.0]
    ki:
      type: double
      default_value: 0.0
      description: "Shared velocity integral gain applied to both wheels"
      validation:
        bounds<>: [0.0, 100000.0]
    kd:
      type: double
      default_value: 0.0
      description: "Shared velocity derivative gain applied to both wheels"
      validation:
        bounds<>: [0.0, 100000.0]
    left_kp:
      type: double
      default_value: 0.02
      description: "Left wheel velocity proportional gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    left_ki:
      type: double
      default_value: 0.0
      description: "Left wheel velocity integral gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    left_kd:
      type: double
      default_value: 0.0
      description: "Left wheel velocity derivative gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    right_kp:
      type: double
      default_value: 0.02
      description: "Right wheel velocity proportional gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    right_ki:
      type: double
      default_value: 0.0
      description: "Right wheel velocity integral gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    right_kd:
      type: double
      default_value: 0.0
      description: "Right wheel velocity derivative gain override"
      validation:
        bounds<>: [0.0, 100000.0]
    i_clamp:
      type: double
      default_value: 1.0
      description: "Absolute clamp for accumulated integral contribution"
      validation:
        bounds<>: [0.0, 100000.0]
    output_limit_norm:
      type: double
      default_value: 1.0
      description: "Absolute clamp for PID normalized output command"
      validation:
        bounds<>: [0.0, 1.0]
    stop_deadband_rpm:
      type: double
      default_value: 1.0
      description: "Setpoint deadband where output is forced to zero"
      validation:
        bounds<>: [0.0, 100000.0]
    velocity_alpha:
      type: double
      default_value: 1.0
      description: "Low-pass filter alpha for measured velocity [0,1]"
      validation:
        bounds<>: [0.0, 1.0]

  control:
    loop_ms:
      type: int
      default_value: 50
      description: "Control-loop period in milliseconds"
      validation:
        bounds<>: [1, 1000]
  
  sim:
    world_name:
      type: string 
      default_value: "sae"
      description: "Simulation World name"
